<!doctype html>
<html lang="th" class="h-full">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GA Equipment Control</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#185FA5', 'brand-light': '#E8F0FA',
            success: '#0F6E56', 'success-light': '#E6F5F0',
            warn: '#D97706', 'warn-light': '#FEF3C7',
            danger: '#DC2626', 'danger-light': '#FEF2F2',
            surface: '#F7F7F5', card: '#FFFFFF',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap');

    :root {
      --gd-brand: #EA580C;
      --gd-brand-strong: #C2410C;
      --gd-brand-vivid: #F97316;
      --gd-cyan: #FB923C;
      --gd-violet: #FDBA74;
      --gd-brand-soft: #FFF2E8;
      --gd-surface: #FFF7ED;
      --gd-card: #FFFFFF;
      --gd-text: #0F172A;
      --gd-muted: #64748B;
      --gd-border: #E2E8F0;
      --gd-radius-card: 24px;
      --gd-radius-control: 10px;
      --gd-shadow-sm: 0 4px 12px rgba(15, 23, 42, 0.05);
      --gd-shadow-md: 0 10px 30px rgba(15, 23, 42, 0.08);
      --gd-shadow-hover: 0 15px 40px rgba(15, 23, 42, 0.12);
    }

    html, body {
      height: 100%; margin: 0;
      font-family: 'Noto Sans Thai', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--gd-text); background: var(--gd-surface);
    }

    * { -webkit-tap-highlight-color: transparent; }

    .screen { display: none; height: 100%; }
    .screen.active { display: flex; flex-direction: column; }

    .card-shadow { box-shadow: var(--gd-shadow-sm); }
    .card-shadow-md { box-shadow: var(--gd-shadow-md); }

    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #CBD5E1; transition: all 0.15s ease;
    }
    .pin-dot.filled { background: #EA580C; border-color: #EA580C; transform: scale(1.15); }
    .pin-dot.error { background: #EF4444; border-color: #EF4444; animation: shake 0.4s ease; }

    @keyframes shake {
      0%, 100% { transform: translateX(0) }
      25% { transform: translateX(-6px) }
      75% { transform: translateX(6px) }
    }

    .numpad-key {
      width: 72px; height: 52px; border-radius: var(--gd-radius-control);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 600; color: #1E293B;
      cursor: pointer; transition: background 0.15s ease, transform 0.15s ease;
      user-select: none; -webkit-user-select: none; border: 1px solid transparent;
    }
    .numpad-key:active { background: #E2E8F0; transform: scale(0.98); }

    .tab-active {
      color: #0f172a; border: 1px solid #fed7aa;
      background: linear-gradient(160deg, #fff7ed 0%, #ffedd5 100%);
      box-shadow: 0 8px 18px rgba(249, 115, 22, 0.2); font-weight: 700;
    }
    .tab-inactive { color: #64748b; border: 1px solid transparent; background: transparent; }

    .chip {
      padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 500;
      white-space: nowrap; cursor: pointer; transition: all 0.2s ease;
      border: 1.5px solid var(--gd-border); background: rgba(255,255,255,0.88); color: var(--gd-muted);
    }
    .chip.active {
      background: linear-gradient(140deg, #f97316, #ea580c); color: white;
      border-color: #c2410c; box-shadow: 0 10px 20px rgba(234, 88, 12, 0.3);
    }

    .fade-in { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }

    input, select, textarea {
      font-family: 'Noto Sans Thai', 'Inter', sans-serif;
      border-radius: var(--gd-radius-control); border-color: var(--gd-border);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #fdba74 !important;
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.18); background: #fff;
    }

    button { transition: all 0.2s ease; font-family: 'Noto Sans Thai', 'Inter', sans-serif; }
    button:active { transform: translateY(0.5px) scale(0.99); }

    .gd-shell {
      background:
        radial-gradient(circle at 0% 0%, rgba(251, 146, 60, 0.28), transparent 36%),
        radial-gradient(circle at 100% 0%, rgba(249, 115, 22, 0.18), transparent 38%),
        radial-gradient(circle at 50% 100%, rgba(234, 88, 12, 0.12), transparent 45%),
        linear-gradient(180deg, #fff7ed 0%, #ffedd5 48%, #fed7aa 100%);
    }
    .gd-header {
      background: rgba(255, 255, 255, 0.9); border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(10px);
    }
    .gd-card {
      background: var(--gd-card); border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: var(--gd-radius-card); box-shadow: var(--gd-shadow-sm);
      transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }
    .gd-card:hover {
      box-shadow: 0 20px 36px rgba(234, 88, 12, 0.16), 0 4px 14px rgba(251, 146, 60, 0.12);
      border-color: rgba(249, 115, 22, 0.45); transform: translateY(-2px);
    }
    .gd-card-soft { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 14px; }
    .gd-input {
      width: 100%; height: 44px; padding: 0 14px; border: 1px solid var(--gd-border);
      border-radius: 10px; background: #f8fafc; font-size: 14px; color: #0F172A;
    }
    .gd-btn-primary {
      background: linear-gradient(135deg, var(--gd-brand) 0%, #f97316 48%, var(--gd-violet) 100%);
      color: #fff; border-radius: 12px; font-size: 14px; font-weight: 600; min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 14px 30px rgba(234, 88, 12, 0.35), 0 6px 14px rgba(249, 115, 22, 0.22);
    }
    .gd-btn-primary:hover { transform: translateY(-1px); filter: saturate(1.08); }
    .gd-btn-primary:disabled, .gd-btn-primary.is-disabled {
      background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%); color: #e2e8f0;
      opacity: 0.72; box-shadow: none; cursor: not-allowed; pointer-events: none;
    }
    .gd-btn-secondary {
      border: 1px solid #CBD5E1; background: #fff; color: #475569;
      border-radius: 12px; font-size: 14px; font-weight: 600; min-height: 44px;
    }
    .gd-btn-danger {
      border: 1px solid #fecaca; background: #fef2f2; color: #dc2626;
      border-radius: 12px; font-size: 14px; font-weight: 600; min-height: 44px;
    }
    .gd-section-title {
      font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: #64748B;
    }
    .gd-page { padding: 24px 16px 32px; }
    .gd-page-header {
      margin-bottom: 16px; padding: 18px 20px; border-radius: 20px;
      border: 1px solid rgba(251, 146, 60, 0.34);
      background: linear-gradient(145deg, rgba(255,255,255,0.95) 0%, rgba(255,237,213,0.95) 56%, rgba(255,247,237,0.92) 100%);
      box-shadow: var(--gd-shadow-sm);
    }
    .gd-modal-panel {
      background: linear-gradient(160deg, #ffffff 0%, #f9fbff 100%); border-radius: 24px;
      border: 1px solid #e2e8f0; box-shadow: 0 20px 45px rgba(15, 23, 42, 0.2); padding: 24px;
    }
    .gd-empty {
      border: 1px dashed #cbd5e1; border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    /* Status badges */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      min-height: 26px; padding: 5px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.02em;
      border: 1px solid transparent; white-space: nowrap;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 999px; flex-shrink: 0; }
    .status-borrowed { background: #FFFBEB; color: #B45309; border-color: #FDE68A; }
    .status-returned { background: #ECFDF3; color: #047857; border-color: #A7F3D0; }
    .status-overdue { background: #FEF2F2; color: #B91C1C; border-color: #FECACA; }

    /* Stat cards */
    .stat-card { transition: transform 0.15s; border: 1px solid rgba(148,163,184,0.16); border-radius: var(--gd-radius-card); }
    .stat-card:active { transform: scale(0.97); }

    /* Signature pad */
    .signature-pad {
      position: relative; border: 1px solid #E2E8F0; border-radius: 16px;
      background: #F8FAFC; padding: 16px;
    }
    .signature-pad__header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px;
    }
    .signature-pad__title { font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #64748B; }
    .signature-pad__clear {
      display: inline-flex; align-items: center; gap: 6px; min-height: 36px; padding: 8px 12px;
      border: 1px solid #CBD5E1; border-radius: 10px; background: #FFFFFF;
      color: #334155; font-size: 12px; font-weight: 600;
    }
    .signature-pad__frame {
      position: relative; border: 1px dashed #CBD5E1; border-radius: 12px;
      background: #FFFFFF; padding: 12px; overflow: hidden;
    }
    canvas.sig-canvas {
      touch-action: none; pointer-events: auto; background: #fff;
      border-radius: 12px; display: block; user-select: none; border: 1px solid #E2E8F0;
    }

    /* Login */
    .login-shell {
      min-height: 100%; padding: 24px 18px 32px;
      background:
        radial-gradient(circle at 14% 10%, rgba(255,237,213,0.95) 0%, rgba(254,215,170,0.28) 34%, rgba(249,115,22,0) 58%),
        radial-gradient(circle at 100% 0%, rgba(251,146,60,0.35) 0%, rgba(234,88,12,0) 48%),
        linear-gradient(155deg, #FFF7ED 0%, #FFEDD5 45%, #FED7AA 100%);
    }
    .login-card {
      width: 100%; max-width: 432px; border-radius: 24px; padding: 32px;
      border: 1px solid rgba(255,255,255,0.55);
      background: linear-gradient(140deg, rgba(255,255,255,0.88), rgba(255,255,255,0.76));
      box-shadow: 0 28px 52px rgba(234,88,12,0.16), 0 8px 20px rgba(15,23,42,0.08);
      backdrop-filter: blur(16px);
    }
    .user-card {
      border: 1px solid rgba(148,163,184,0.22); border-radius: 16px;
      background: rgba(255,255,255,0.86);
      transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
      cursor: pointer;
    }
    .user-card:hover { transform: translateY(-1px); box-shadow: 0 14px 28px rgba(15,23,42,0.08); border-color: rgba(59,130,246,0.35); }
    .user-card:active { transform: scale(0.988); }
    .user-card.selected { border-color: rgba(37,99,235,0.65); box-shadow: 0 0 0 3px rgba(59,130,246,0.12), 0 12px 24px rgba(30,64,175,0.12); }
    .avatar-gradient { box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 6px 14px rgba(59,130,246,0.28); color: #EAF3FF; }
    .admin-card { border-color: rgba(148,163,184,0.3); background: linear-gradient(120deg, rgba(241,245,249,0.8), rgba(248,250,252,0.95)); }

    /* Tab bar */
    #mainTabBar { gap: 8px; border: 0; border-radius: 16px; padding: 6px; background: #eff4fb; }
    #mainTabBar .main-tab { letter-spacing: 0.01em; border-radius: 12px; transition: all 0.2s ease; }
    #mainTabBar .main-tab:hover { color: #1e3a8a; background: rgba(255,255,255,0.8); }

    /* Toast */
    .toast-success { background: linear-gradient(135deg, #047857, #065F46); }
    .toast-error { background: linear-gradient(135deg, #B91C1C, #991B1B); }
    .toast-warning { background: linear-gradient(135deg, #B45309, #92400E); }
    .toast-info { background: linear-gradient(135deg, #1E293B, #334155); }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

    ::-webkit-scrollbar { width: 0; height: 0; }

    @keyframes spin { to { transform: rotate(360deg) } }

    @media (max-width: 480px) {
      .login-card { padding: 24px; border-radius: 22px; }
      .login-shell { padding: 16px; }
    }
  </style>
</head>

<body class="h-full gd-shell">
  <div id="app-root" class="h-full w-full flex justify-center overflow-auto">
    <div class="w-full xl:px-8" style="max-width:1180px;height:100%;position:relative;">

      <!-- LOADING -->
      <div id="screen-loading" class="screen active">
        <div class="flex-1 flex flex-col items-center justify-center gap-4 px-6">
          <div class="w-14 h-14 rounded-2xl bg-brand flex items-center justify-center mb-2">
            <span class="text-white text-xl font-bold">EC</span>
          </div>
          <div class="flex flex-col items-center gap-3">
            <div class="w-8 h-8 border-3 border-brand-light border-t-brand rounded-full animate-spin"
              style="border-width:3px;border-top-color:#185FA5;border-color:#E8F0FA;animation:spin .8s linear infinite"></div>
            <p class="text-sm text-gray-400 font-medium">กำลังโหลด...</p>
            <p id="loadingMsg" class="text-xs text-gray-300"></p>
            <p id="loadingSlowHint" class="hidden text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-full px-3 py-1">
              เครือข่ายช้า กำลังพยายามเชื่อมต่อ...</p>
            <button id="loadingRetryBtn" onclick="init(true)"
              class="hidden mt-1 px-4 py-2 text-sm font-semibold gd-btn-secondary">ลองใหม่</button>
          </div>
        </div>
      </div>

      <!-- LOGIN -->
      <div id="screen-login" class="screen">
        <div class="login-shell flex-1 overflow-auto flex items-center justify-center">
          <div class="login-card fade-in">
            <div class="text-center mb-8">
              <div class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-gradient-to-br from-orange-400 to-orange-600 shadow-lg shadow-orange-500/30 mb-5">
                <span class="text-white text-2xl font-extrabold tracking-tight">EC</span>
              </div>
              <h1 class="text-[2rem] leading-tight font-extrabold tracking-[-0.02em] text-slate-900">Equipment Control</h1>
              <p class="text-sm text-slate-500 mt-2">ระบบยืม-คืนอุปกรณ์สำนักงาน GA</p>
            </div>

            <div class="mb-8">
              <p class="gd-section-title mb-3">Select user</p>
              <div class="space-y-3" id="gaUserList"></div>
            </div>

            <div class="mb-4 gd-card-soft p-4">
              <p class="gd-section-title mb-3 flex items-center gap-1.5">
                <i data-lucide="shield" class="w-3.5 h-3.5"></i>Admin access
              </p>
              <div class="space-y-3" id="mgrUserList"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- PIN -->
      <div id="screen-pin" class="screen">
        <div class="flex-1 flex flex-col items-center justify-center px-6 pb-8">
          <button onclick="goScreen('login')"
            class="self-start mb-6 p-2 -ml-2 rounded-full hover:bg-gray-100 transition">
            <i data-lucide="arrow-left" class="w-5 h-5 text-gray-500"></i>
          </button>
          <div id="pin-avatar"
            class="w-16 h-16 rounded-full bg-orange-100 text-brand flex items-center justify-center font-bold text-lg mb-3"></div>
          <p id="pin-name" class="font-semibold text-gray-900 mb-1"></p>
          <p class="text-sm text-gray-400 mb-8">กรอก PIN 6 หลัก</p>
          <div class="flex gap-3 mb-10" id="pin-dots">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
          </div>
          <div id="pin-error" class="text-red-500 text-sm mb-3 h-5 font-medium"></div>
          <div class="grid grid-cols-3 gap-3">
            <div class="numpad-key" onclick="enterPin('1')">1</div>
            <div class="numpad-key" onclick="enterPin('2')">2</div>
            <div class="numpad-key" onclick="enterPin('3')">3</div>
            <div class="numpad-key" onclick="enterPin('4')">4</div>
            <div class="numpad-key" onclick="enterPin('5')">5</div>
            <div class="numpad-key" onclick="enterPin('6')">6</div>
            <div class="numpad-key" onclick="enterPin('7')">7</div>
            <div class="numpad-key" onclick="enterPin('8')">8</div>
            <div class="numpad-key" onclick="enterPin('9')">9</div>
            <div class="numpad-key"></div>
            <div class="numpad-key" onclick="enterPin('0')">0</div>
            <div class="numpad-key" onclick="deletePin()"><i data-lucide="delete" class="w-5 h-5 text-gray-400"></i></div>
          </div>
        </div>
      </div>

      <!-- MAIN -->
      <div id="screen-main" class="screen">
        <div class="gd-header px-4 lg:px-8 pt-6 pb-4" style="position:sticky;top:0;z-index:20;">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
              <div id="main-avatar" class="w-10 h-10 rounded-full bg-orange-100 text-brand flex items-center justify-center font-bold text-sm"></div>
              <div>
                <p id="main-user-name" class="font-semibold text-gray-900 text-sm leading-tight"></p>
                <p id="main-user-role" class="text-xs text-gray-400">GA Staff</p>
              </div>
            </div>
            <button onclick="confirmLogout()" class="p-2.5 rounded-xl hover:bg-slate-100 transition">
              <i data-lucide="log-out" class="w-4 h-4 text-gray-400"></i>
            </button>
          </div>
          <div class="flex" id="mainTabBar"></div>
        </div>
        <!-- GA Tabs -->
        <div id="tab-borrow" class="flex-1 overflow-auto hidden"></div>
        <div id="tab-return" class="flex-1 overflow-auto hidden"></div>
        <div id="tab-history" class="flex-1 overflow-auto hidden"></div>
        <!-- MGR Tabs -->
        <div id="tab-dashboard" class="flex-1 overflow-auto hidden"></div>
        <div id="tab-mgr-history" class="flex-1 overflow-auto hidden"></div>
        <div id="tab-equipment" class="flex-1 overflow-auto hidden"></div>
        <div id="tab-members" class="flex-1 overflow-auto hidden"></div>
      </div>

      <!-- BORROW FORM (overlay) -->
      <div id="screen-borrow-form" class="screen" style="position:absolute;inset:0;z-index:50;background:var(--gd-surface);">
        <div class="gd-header px-4 py-3 flex items-center gap-3" style="position:sticky;top:0;z-index:10;">
          <button onclick="closeBorrowForm()" class="p-1.5 rounded-full hover:bg-gray-100 transition">
            <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i>
          </button>
          <div class="flex-1">
            <p class="font-semibold text-gray-900 text-sm">ยืมอุปกรณ์</p>
            <p id="bf-eq-name" class="text-xs text-gray-400"></p>
          </div>
        </div>
        <div class="flex-1 overflow-auto px-4 pt-4 pb-6" id="bf-body"></div>
      </div>

      <!-- RETURN DETAIL (overlay) -->
      <div id="screen-return-detail" class="screen" style="position:absolute;inset:0;z-index:50;background:var(--gd-surface);">
        <div class="gd-header px-4 py-3 flex items-center gap-3" style="position:sticky;top:0;z-index:10;">
          <button onclick="closeReturnDetail()" class="p-1.5 rounded-full hover:bg-gray-100 transition">
            <i data-lucide="arrow-left" class="w-5 h-5 text-gray-600"></i>
          </button>
          <div class="flex-1">
            <p class="font-semibold text-gray-900 text-sm">คืนอุปกรณ์</p>
            <p id="rd-eq-name" class="text-xs text-gray-400"></p>
          </div>
          <span id="rd-badge" class="text-xs px-2.5 py-1 rounded-full font-medium"></span>
        </div>
        <div class="flex-1 overflow-auto px-4 pt-4 pb-6" id="rd-body"></div>
      </div>

    </div><!-- end max-width wrapper -->
  </div><!-- end app-root -->

  <!-- Equipment Modal (Add/Edit) -->
  <div id="equipModal" class="fixed inset-0 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-200 px-6" style="z-index:300;">
    <div class="absolute inset-0 bg-black/40" onclick="closeEquipModal()"></div>
    <div class="relative w-full gd-modal-panel" style="max-width:380px;">
      <h3 id="equipModalTitle" class="font-bold text-gray-900 text-lg mb-4">เพิ่มอุปกรณ์</h3>
      <div class="space-y-4">
        <div><label class="text-xs font-semibold text-gray-500 mb-1.5 block">ชื่ออุปกรณ์</label>
          <input type="text" id="eqName" placeholder="เช่น โน๊ตบุ๊ค Dell" class="gd-input"></div>
        <div><label class="text-xs font-semibold text-gray-500 mb-1.5 block">หมวดหมู่</label>
          <select id="eqCategory" class="gd-input">
            <option value="">เลือกหมวดหมู่</option>
            <option>คอมพิวเตอร์</option><option>โสตทัศนูปกรณ์</option>
            <option>เครื่องใช้สำนักงาน</option><option>เครื่องมือช่าง</option><option>อื่นๆ</option>
          </select></div>

  <script>

    // ===== STATE =====

    // ===== AVATAR COLORS =====
    const AVATARS = [
      { bg: 'bg-orange-100', tc: 'text-brand' }, { bg: 'bg-amber-100', tc: 'text-amber-700' },

    function ini(n) { const p = (n || '').trim().split(' '); return p.length >= 2 ? p[0][0] + p[1][0] : (n || '').slice(0, 2); }

    // ===== UTILS =====
    function he(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(x => x.toString(16).padStart(2, '0')).join('');
    }
    function fd(d) {
      if (!d) return '-';
      try { const dt = new Date(d); if (isNaN(dt)) return d; return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()+543}`; } catch(e) { return d; }
    }
    function fdFull(d) {
      if (!d) return '-';
      try { const dt = new Date(d); if (isNaN(dt)) return d; return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()+543} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`; } catch(e) { return d; }
    }
    function daysUntil(dateStr) {
      if (!dateStr) return 999;
      const now = new Date(); now.setHours(0,0,0,0);
      const d = new Date(dateStr); d.setHours(0,0,0,0);
      return Math.ceil((d - now) / 86400000);
    }
    function goScreen(name) {
      document.querySelectorAll('.screen').forEach(s => { s.classList.remove('active'); s.style.display = 'none'; });
      const t = document.getElementById('screen-' + name);

    function showModal(id) { const m = document.getElementById(id); if(m) { m.classList.remove('pointer-events-none','opacity-0'); m.classList.add('pointer-events-auto','opacity-100'); lucide.createIcons(); } }
    function hideModal(id) { const m = document.getElementById(id); if(m) { m.classList.add('pointer-events-none','opacity-0'); m.classList.remove('pointer-events-auto','opacity-100'); } }
    function toast(msg, tone='info') {
      const t = document.getElementById('toast'), icon = document.getElementById('toastIcon'), text = document.getElementById('toastText');
      if (!t||!icon||!text) return;
      text.textContent = msg;
      t.classList.remove('toast-success','toast-error','toast-warning','toast-info');
      const im = { success:'check-circle-2', error:'x-circle', warning:'alert-triangle', info:'info' };
      t.classList.add('toast-'+(im[tone]?tone:'info'));
      icon.setAttribute('data-lucide', im[tone]||'info'); lucide.createIcons();
      t.style.opacity='1'; t.style.pointerEvents='auto';
      setTimeout(()=>{ t.style.opacity='0'; t.style.pointerEvents='none'; }, 2600);
    }
    function skeletonCards(n) {
      return Array(n).fill(0).map(()=>`<div class="gd-card p-4 mb-3"><div class="flex justify-between mb-2"><div><div class="h-3.5 skeleton rounded w-36 mb-1.5"></div><div class="h-3 skeleton rounded w-24"></div></div><div class="h-5 skeleton rounded-full w-14"></div></div></div>`).join('');
    }

    // ===== CACHE =====
    const CACHE_TTL = 10*60*1000;
    function cacheSet(k,v) { try { localStorage.setItem(k, JSON.stringify({t:Date.now(),v})); } catch(e){} }
    function cacheGet(k) { try { const c=JSON.parse(localStorage.getItem(k)||'null'); if(c&&Date.now()-c.t<CACHE_TTL) return c.v; } catch(e){} return null; }
    function cacheDel(k) { try { localStorage.removeItem(k); } catch(e){} }

    // ===== STATUS HELPERS =====
    function statusMeta(s) {
      return {
        borrowed: { th:'กำลังยืม', style:'status-borrowed', dot:'bg-amber-500', icon:'clock-3' },
        returned: { th:'คืนแล้ว', style:'status-returned', dot:'bg-emerald-500', icon:'check-circle-2' },
        overdue:  { th:'เกินกำหนด', style:'status-overdue', dot:'bg-red-500', icon:'alert-triangle' },
      }[s] || { th:s||'-', style:'status-borrowed', dot:'bg-slate-400', icon:'help-circle' };
    }
    function statusBadge(s) {
      const m = statusMeta(s);
      return `<span class="status-badge ${m.style}"><span class="status-dot ${m.dot}"></span>${m.th}</span>`;
    }
    function detectOverdue(records) {
      const today = new Date(); today.setHours(0,0,0,0);
      return records.map(r => {
        if (r.status === 'borrowed' && r.due_date) {
          const d = new Date(r.due_date); d.setHours(0,0,0,0);
          if (d < today) r.status = 'overdue';
        }
        return r;
      });
    }

    // ===== API =====
    async function api(action, params = {}) {
      try {
        if (action === 'getUsers') {
          const { data: ga, error: gaErr } = await sb.from('ga_staff').select('name, role, email');
          const { data: mgr, error: mgrErr } = await sb.from('managers').select('name, role, email');
          if (!gaErr && !mgrErr) {
            AUTH_MODE = 'legacy';
            return { ga: (ga||[]).map(r=>({name:r.name,role:r.role,email:r.email||''})), mgr: (mgr||[]).map(r=>({name:r.name,role:r.role,email:r.email||''})) };
          }

          const { data: users, error: usersErr } = await sb.from('users').select('full_name, role, email, is_active').eq('is_active', true);
          if (!usersErr && Array.isArray(users)) {
            const mapped = {
              ga: users.filter(u=>u.role==='ga').map(u=>({name:u.full_name,role:'ga',email:u.email||''})),
              mgr: users.filter(u=>u.role==='mgr').map(u=>({name:u.full_name,role:'mgr',email:u.email||''}))
            };
            if (mapped.ga.length || mapped.mgr.length) {
              AUTH_MODE = 'users_no_pin';
              return mapped;
            }
          }

          AUTH_MODE = 'demo';
          return FALLBACK_USERS;
        }
        if (action === 'verifyPin') {
          if (AUTH_MODE !== 'legacy') {
            const input = String(params.pin).padStart(6,'0');
            return { ok: input === FALLBACK_PIN };
          }
          const table = params.role==='ga'?'ga_staff':'managers';
          const { data } = await sb.from(table).select('*').eq('name',params.name).single();
          if (!data) return { ok:false };
          const stored = String(data.pin), input = String(params.pin).padStart(6,'0'), hInput = await sha256(input);
          if (stored===hInput) return { ok:true };
          if (stored===input) { await sb.from(table).update({pin:hInput}).eq('name',params.name); return { ok:true }; }
          return { ok:false };
        }
        if (action === 'changePin') {
          const table = params.role==='ga'?'ga_staff':'managers';
          const h = await sha256(String(params.newPin).padStart(6,'0'));
          const { error } = await sb.from(table).update({pin:h}).eq('name',params.name);
          return { ok:!error };
        }
        if (action === 'getEquipment') {
          const { data } = await sb.from('equipment').select('*').order('name');
          return (data || []).map((r, idx) => ({
            ...r,
            eq_id: r.eq_id || r.id || `eq-${idx}`,
            serial_no: r.serial_no || r.code || null
          }));
        }
        if (action === 'getBorrows') {
          let q = sb.from('borrow_records').select('*');
          if (params.role === 'ga') q = q.eq('ga_staff', params.name);
          const { data } = await q.order('borrowed_at', { ascending: false });
          return detectOverdue(data || []);
        }
        if (action === 'createBorrow') {
          const rid = 'BR' + Date.now();
          const { error: brErr } = await sb.from('borrow_records').insert([{
            record_id: rid, eq_id: params.eq_id, eq_name: params.eq_name,
            qty_borrowed: params.qty, borrower_name: params.borrower_name,
            borrower_dept: params.borrower_dept, ga_staff: params.ga_staff,
            borrowed_at: new Date().toISOString(), due_date: params.due_date,
            sign_img: params.sign_img || '', note: params.note || '', status: 'borrowed'
          }]);
          if (brErr) throw brErr;
          // Try new schema (id UUID) first, then legacy (eq_id text)
          let { data: eq } = await sb.from('equipment').select('available').eq('id', params.eq_id).maybeSingle();
          if (eq) {
            await sb.from('equipment').update({ available: Math.max(0, eq.available - params.qty) }).eq('id', params.eq_id);
          } else {
            const r = await sb.from('equipment').select('available').eq('eq_id', params.eq_id).maybeSingle();
            if (r.data) await sb.from('equipment').update({ available: Math.max(0, r.data.available - params.qty) }).eq('eq_id', params.eq_id);
          }
          return { ok: true, record_id: rid };
        }
        if (action === 'returnBorrow') {
          const { error } = await sb.from('borrow_records').update({
            status: 'returned', returned_at: new Date().toISOString(),
            return_sign_img: params.return_sign_img || ''
          }).eq('record_id', params.record_id);
          if (error) throw error;
          const { data: rec } = await sb.from('borrow_records').select('eq_id, qty_borrowed').eq('record_id', params.record_id).single();
          if (rec) {
            // Try new schema (id UUID) first, then legacy (eq_id text)
            let { data: eq } = await sb.from('equipment').select('available, quantity').eq('id', rec.eq_id).maybeSingle();
            if (eq) {
              await sb.from('equipment').update({ available: Math.min(eq.quantity, eq.available + rec.qty_borrowed) }).eq('id', rec.eq_id);
            } else {
              const r = await sb.from('equipment').select('available, quantity').eq('eq_id', rec.eq_id).maybeSingle();
              if (r.data) await sb.from('equipment').update({ available: Math.min(r.data.quantity, r.data.available + rec.qty_borrowed) }).eq('eq_id', rec.eq_id);
            }
          }
          return { ok: true };
        }
        if (action === 'addEquipment') {
          const qty = Number(params.quantity) || 1;
          // Build unique code from serial_no or name + timestamp suffix to avoid duplicates
          const base = (params.serial_no || params.name || '').toUpperCase()
            .replace(/[^A-Z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 16);
          const code = (base || 'EQ') + '-' + Date.now().toString().slice(-6);
          const payload = { code, name: params.name, category: params.category || null, quantity: qty, available: qty };
          const { data, error } = await sb.from('equipment').insert([payload]).select('id').single();
          if (error) throw error;
          return { ok: true, eq_id: data.id };
        }
        if (action === 'updateEquipment') {
          const upd = { name: params.name, category: params.category || null, quantity: Number(params.quantity) || 1 };
          if (params.available !== undefined) upd.available = Number(params.available);
          // Try new schema (id UUID) first, then legacy (eq_id text)
          let { error } = await sb.from('equipment').update(upd).eq('id', params.eq_id);
          if (error) {
            const res = await sb.from('equipment').update(upd).eq('eq_id', params.eq_id);
            if (res.error) throw res.error;
          }
          return { ok: true };
        }
        if (action === 'deleteEquipment') {
          // Try new schema (id UUID) first, then legacy (eq_id text)
          let { error } = await sb.from('equipment').delete().eq('id', params.eq_id);
          if (error) {
            const res = await sb.from('equipment').delete().eq('eq_id', params.eq_id);
            if (res.error) throw res.error;
          }
          return { ok: true };
        }
        if (action === 'addUser') {
          const table = params.role==='ga'?'ga_staff':'managers';
          const h = await sha256(String(params.pin).padStart(6,'0'));
          const { error } = await sb.from(table).insert([{ name:params.name, pin:h, role:params.role }]);
          if (error) throw error;
          return { ok:true };
        }
        if (action === 'deleteUser') {
          const table = params.role==='ga'?'ga_staff':'managers';
          const { error } = await sb.from(table).delete().eq('name', params.name);
          if (error) throw error;
          return { ok:true };
        }
        throw new Error('Unknown action: '+action);
      } catch(err) { console.error('API Error:', err); throw err; }
    }

    // ===== SIGNATURE PAD =====
    function getSignaturePoint(canvas, e) {
      const rc = canvas.getBoundingClientRect();
      const src = e.touches?.[0] ?? e.changedTouches?.[0] ?? e;
      return [src.clientX - rc.left, src.clientY - rc.top];
    }
    function drawStart(canvas, e) {
      if (!sctx) return; if (e.cancelable) e.preventDefault();
      drawing = true;
      if (typeof e.pointerId === 'number' && canvas.setPointerCapture) canvas.setPointerCapture(e.pointerId);
      const [x,y] = getSignaturePoint(canvas, e); sctx.beginPath(); sctx.moveTo(x,y);
    }
    function drawMove(canvas, e) {
      if (!sctx || !drawing) return; if (e.cancelable) e.preventDefault();
      const [x,y] = getSignaturePoint(canvas, e); sctx.lineTo(x,y); sctx.stroke(); hasSignatureStroke = true;
    }
    function drawEnd(canvas, e) {
      if (e?.cancelable) e.preventDefault(); drawing = false;
      if (typeof e?.pointerId === 'number' && canvas.releasePointerCapture) try { canvas.releasePointerCapture(e.pointerId); } catch(_){}
    }
    function sizeSignatureCanvas(canvas) {
      if (!canvas) return;
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      if (!w || !h) return;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(w * dpr); canvas.height = Math.round(h * dpr);
      sctx = canvas.getContext('2d'); if (!sctx) return;
      sctx.setTransform(dpr,0,0,dpr,0,0);
      sctx.strokeStyle = '#1E293B'; sctx.lineWidth = 2; sctx.lineCap = 'round'; sctx.lineJoin = 'round';
      sctx.fillStyle = '#FFFFFF'; sctx.fillRect(0,0,w,h);
      hasSignatureStroke = false;
    }
    function bindSignatureEvents(canvas) {
      if (signatureListenersCleanup) signatureListenersCleanup();
      const opts = { passive: false };
      const handlers = [
        ['pointerdown', e=>drawStart(canvas,e)], ['pointermove', e=>drawMove(canvas,e)],
        ['pointerup', e=>drawEnd(canvas,e)], ['pointercancel', e=>drawEnd(canvas,e)],
        ['touchstart', e=>drawStart(canvas,e)], ['touchmove', e=>drawMove(canvas,e)],
        ['touchend', e=>drawEnd(canvas,e)],
      ];
      handlers.forEach(([ev,fn]) => canvas.addEventListener(ev,fn,opts));
      signatureListenersCleanup = () => { handlers.forEach(([ev,fn]) => canvas.removeEventListener(ev,fn,opts)); signatureListenersCleanup = null; };
    }
    function initSignCanvas(canvasId, retries=0) {
      const c = document.getElementById(canvasId);
      if (!c) return;
      if (c.offsetWidth === 0 && retries < 10) { requestAnimationFrame(()=>initSignCanvas(canvasId, retries+1)); return; }
      signatureCanvasEl = c; c.style.touchAction = 'none';
      sizeSignatureCanvas(c); bindSignatureEvents(c);
    }
    function clearSignCanvas(canvasId) {
      const c = document.getElementById(canvasId); if (!c) return;
      sctx = c.getContext('2d');
      if (sctx) { const w=c.offsetWidth, h=c.offsetHeight; sctx.clearRect(0,0,w*2,h*2); sctx.fillStyle='#FFFFFF'; sctx.fillRect(0,0,w*2,h*2); hasSignatureStroke = false; }
    }
    function isCanvasBlank() { return !hasSignatureStroke; }
    function exportSignature(canvas) {
      const out = document.createElement('canvas'); out.width = canvas.width; out.height = canvas.height;
      const ctx = out.getContext('2d'); ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,out.width,out.height);
      ctx.drawImage(canvas, 0, 0);
      return out.toDataURL('image/jpeg', 0.85);
    }

    async function checkPin() {
      const now = Date.now();
      if (PIN_LOCKED_UNTIL > now) { document.getElementById('pin-error').textContent = `ล็อกชั่วคราว ${Math.ceil((PIN_LOCKED_UNTIL-now)/1000)} วินาที`; PB=''; updatePinDots(); return; }
      document.querySelectorAll('#screen-pin .numpad-key').forEach(b=>b.style.pointerEvents='none');
      document.getElementById('pin-error').innerHTML = '<span class="text-brand flex items-center justify-center gap-1.5"><svg class="animate-spin w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> กำลังตรวจสอบ...</span>';
      try {
        const [res, eqData, brData] = await Promise.all([
          api('verifyPin', { name:SU.name, pin:PB, role:SU.role }),
          api('getEquipment'),
          api('getBorrows', { name:SU.name, role:SU.role })
        ]);
        if (res.ok) {
          PIN_ATTEMPTS = 0; CU = { ...SU }; EQ = eqData; BORROWS = brData;
          toast('ยินดีต้อนรับ ' + CU.name.split(' ')[0]);
          buildMain(); goScreen('main'); lucide.createIcons(); startAutoLogout();
        } else {
          PIN_ATTEMPTS++;
          const rem = PIN_MAX_ATTEMPTS - PIN_ATTEMPTS;
          if (PIN_ATTEMPTS >= PIN_MAX_ATTEMPTS) { PIN_LOCKED_UNTIL = Date.now()+PIN_LOCK_MS; document.getElementById('pin-error').textContent = `ล็อกชั่วคราว ${PIN_LOCK_MS/1000} วินาที`; }
          else document.getElementById('pin-error').textContent = `PIN ไม่ถูกต้อง (เหลือ ${rem} ครั้ง)`;
          document.querySelectorAll('#pin-dots .pin-dot').forEach(d=>{ d.classList.remove('filled'); d.classList.add('error'); });
          setTimeout(()=>{ PB=''; updatePinDots(); document.querySelectorAll('#pin-dots .pin-dot').forEach(d=>d.classList.remove('error')); }, 700);
        }
      } catch(e) {
        document.getElementById('pin-error').textContent = 'เกิดข้อผิดพลาด ลองใหม่';
        setTimeout(()=>{ PB=''; updatePinDots(); document.getElementById('pin-error').textContent=''; }, 1200);
      }
      document.querySelectorAll('#screen-pin .numpad-key').forEach(b=>b.style.pointerEvents='');
    }

    async function submitBorrow() {
      const qty = parseInt(document.getElementById('bfQty')?.value)||1;
      const borrower = document.getElementById('bfBorrower')?.value.trim();
      const dept = document.getElementById('bfDept')?.value;
      const due = document.getElementById('bfDue')?.value;
      const note = document.getElementById('bfNote')?.value.trim();
      if (!borrower) { toast('กรุณากรอกชื่อผู้ยืม'); return; }
      if (!dept) { toast('กรุณาเลือกแผนก'); return; }
      if (!due) { toast('กรุณาระบุกำหนดคืน'); return; }
      if (isCanvasBlank()) { toast('กรุณาเซ็นลายเซ็นก่อนยืนยัน'); return; }
      if (qty < 1 || qty > currentBorrowEq.available) { toast('จำนวนไม่ถูกต้อง'); return; }
      const btn = document.getElementById('bfSubmitBtn');
      if (!borrowConfirmState) {
        borrowConfirmState = true;
        btn.innerHTML = '<i data-lucide="alert-triangle" class="w-4 h-4"></i> แตะอีกครั้งเพื่อยืนยัน';
        btn.classList.add('bg-warn'); btn.classList.remove('gd-btn-primary'); lucide.createIcons();
        setTimeout(()=>{ if(borrowConfirmState){ borrowConfirmState=false; if(btn){ btn.innerHTML='<i data-lucide="check" class="w-4 h-4"></i> ยืนยันการยืม'; btn.classList.remove('bg-warn'); btn.classList.add('gd-btn-primary'); lucide.createIcons(); } } }, 3000);
        return;
      }
      borrowConfirmState = false;
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      try {
        const canvas = document.getElementById('bfSignCanvas');
        const sig = canvas ? exportSignature(canvas) : '';
        await api('createBorrow', {
          eq_id: currentBorrowEq.eq_id, eq_name: currentBorrowEq.name, qty,
          borrower_name: borrower, borrower_dept: dept, ga_staff: CU.name,
          due_date: due, sign_img: sig, note
        });
        EQ = await api('getEquipment');
        BORROWS = await api('getBorrows', { name:CU.name, role:CU.role });
        toast('ยืมอุปกรณ์สำเร็จ','success');
        closeBorrowForm();
      } catch(e) { console.error(e); toast('บันทึกไม่สำเร็จ','error'); btn.disabled=false; btn.innerHTML='<i data-lucide="check" class="w-4 h-4"></i> ยืนยันการยืม'; btn.classList.remove('bg-warn'); btn.classList.add('gd-btn-primary'); lucide.createIcons(); }
    }

    async function submitReturn() {
      if (isCanvasBlank()) { toast('กรุณาเซ็นลายเซ็นยืนยันคืน'); return; }
      const btn = document.getElementById('rdSubmitBtn');
      if (!returnConfirmState) {
        returnConfirmState = true;
        btn.innerHTML = '<i data-lucide="alert-triangle" class="w-4 h-4"></i> แตะอีกครั้งเพื่อยืนยัน';
        btn.classList.add('bg-warn'); btn.classList.remove('gd-btn-primary'); lucide.createIcons();
        setTimeout(()=>{ if(returnConfirmState){ returnConfirmState=false; if(btn){ btn.innerHTML='<i data-lucide="check" class="w-4 h-4"></i> ยืนยันการคืน'; btn.classList.remove('bg-warn'); btn.classList.add('gd-btn-primary'); lucide.createIcons(); } } }, 3000);
        return;
      }
      returnConfirmState = false;
      btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
      try {
        const canvas = document.getElementById('rdSignCanvas');
        const sig = canvas ? exportSignature(canvas) : '';
        await api('returnBorrow', { record_id: currentReturnRecord.record_id, return_sign_img: sig });
        EQ = await api('getEquipment');
        BORROWS = await api('getBorrows', { name:CU.name, role:CU.role });
        toast('คืนอุปกรณ์สำเร็จ','success');
        closeReturnDetail();
      } catch(e) { console.error(e); toast('บันทึกไม่สำเร็จ','error'); btn.disabled=false; btn.innerHTML='<i data-lucide="check" class="w-4 h-4"></i> ยืนยันการคืน'; btn.classList.remove('bg-warn'); btn.classList.add('gd-btn-primary'); lucide.createIcons(); }
    }

    function showAddEquipment() {
      _editEqId = null;
      document.getElementById('equipModalTitle').textContent = 'เพิ่มอุปกรณ์';
      document.getElementById('eqName').value = '';
      document.getElementById('eqCategory').value = '';
      document.getElementById('eqSerial').value = '';
      document.getElementById('eqQty').value = '1';
      showModal('equipModal');
    }
    function showEditEquipment(eqId) {
      const eq = EQ.find(e=>e.eq_id===eqId); if(!eq) return;
      _editEqId = eqId;
      document.getElementById('equipModalTitle').textContent = 'แก้ไขอุปกรณ์';
      document.getElementById('eqName').value = eq.name;
      document.getElementById('eqCategory').value = eq.category||'';
      document.getElementById('eqSerial').value = eq.serial_no||'';
      document.getElementById('eqQty').value = eq.quantity;
      showModal('equipModal');
    }
    function closeEquipModal() { hideModal('equipModal'); _editEqId=null; }
    async function submitEquipment() {
      const name = document.getElementById('eqName').value.trim();
      const cat = document.getElementById('eqCategory').value;
      const serial = document.getElementById('eqSerial').value.trim();
      const qty = parseInt(document.getElementById('eqQty').value)||1;
      if (!name) { toast('กรุณากรอกชื่ออุปกรณ์'); return; }
      if (!cat) { toast('กรุณาเลือกหมวดหมู่'); return; }
      const btn = document.getElementById('eqSubmitBtn');
      btn.disabled=true; btn.textContent='กำลังบันทึก...';
      try {
        if (_editEqId) {
          const old = EQ.find(e=>e.eq_id===_editEqId);
          const diff = qty - (old?.quantity||0);
          const newAvail = Math.max(0, (old?.available||0) + diff);
          await api('updateEquipment', { eq_id:_editEqId, name, category:cat, serial_no:serial, quantity:qty, available:newAvail });
        } else {
          await api('addEquipment', { name, category:cat, serial_no:serial, quantity:qty });
        }
        EQ = await api('getEquipment');
        toast(_editEqId?'แก้ไขสำเร็จ':'เพิ่มอุปกรณ์สำเร็จ','success');
        closeEquipModal(); renderEquipmentTab();
      } catch(e) { console.error(e); toast('บันทึกไม่สำเร็จ','error'); }
      btn.disabled=false; btn.textContent='บันทึก';
    }
    function confirmDeleteEquip(eqId) {
      const eq = EQ.find(e=>e.eq_id===eqId); if(!eq) return;
      _deleteEqId = eqId;
      document.getElementById('deleteEquipName').textContent = eq.name;
      showModal('deleteEquipModal');
    }
    function closeDeleteEquipModal() { hideModal('deleteEquipModal'); _deleteEqId=null; }
    async function executeDeleteEquipment() {
      if(!_deleteEqId) return;
      const btn = document.getElementById('delEquipBtn');
      btn.disabled=true; btn.textContent='กำลังลบ...';
      try {
        await api('deleteEquipment', { eq_id:_deleteEqId });
        EQ = await api('getEquipment');
        toast('ลบอุปกรณ์สำเร็จ','success');
        closeDeleteEquipModal(); renderEquipmentTab();
      } catch(e) { toast('ลบไม่สำเร็จ','error'); }
      btn.disabled=false; btn.textContent='ลบเลย';
    }

      if([...AU.ga,...AU.mgr].some(u=>u.name===name)){ toast('ชื่อซ้ำ'); return; }
      const btn = document.getElementById('addUserBtn');
      btn.disabled=true; btn.textContent='กำลังบันทึก...';
      try {
        await api('addUser', { name, role, pin });
        if(role==='ga') AU.ga.push({name,role,email:''}); else AU.mgr.push({name,role,email:''});
        toast('เพิ่มสมาชิกสำเร็จ','success');
        closeUserModal(); renderMembersTab(); buildLoginScreen();
      } catch(e){ toast('เพิ่มไม่สำเร็จ','error'); }
      btn.disabled=false; btn.textContent='บันทึก';
    }
    function confirmDeleteUser(name, role) {
      if(name===CU.name){ toast('ไม่สามารถลบตัวเองได้'); return; }
      _deleteUserTarget = { name, role };
      document.getElementById('deleteUserNameLabel').textContent = name;
      showModal('deleteUserModal');
    }
    function closeDeleteUserModal() { hideModal('deleteUserModal'); _deleteUserTarget=null; }
    async function executeDeleteUser() {
      if(!_deleteUserTarget) return;
      const {name,role} = _deleteUserTarget;
      const btn = document.getElementById('deleteUserConfirmBtn');
      btn.disabled=true; btn.textContent='กำลังลบ...';
      try {
        await api('deleteUser', { name, role });
        if(role==='ga') AU.ga=AU.ga.filter(u=>u.name!==name); else AU.mgr=AU.mgr.filter(u=>u.name!==name);
        toast('ลบสมาชิกสำเร็จ','success');
        closeDeleteUserModal(); renderMembersTab(); buildLoginScreen();
      } catch(e){ toast('ลบไม่สำเร็จ','error'); }
      btn.disabled=false; btn.textContent='ลบเลย';
    }
    function openResetPinModal(name, role) {
      _resetPinTarget = { name, role };
      _resetPinNew = String((crypto.getRandomValues(new Uint32Array(1))[0] % 900000) + 100000);
      document.getElementById('resetPinNameLabel').textContent = name;
      document.getElementById('resetPinValue').textContent = _resetPinNew;
      showModal('resetPinModal');
    }
    function closeResetPinModal() { hideModal('resetPinModal'); _resetPinTarget=null; }
    function regeneratePin() {
      _resetPinNew = String((crypto.getRandomValues(new Uint32Array(1))[0] % 900000) + 100000);
      document.getElementById('resetPinValue').textContent = _resetPinNew;
    }
    async function executeResetPin() {
      if(!_resetPinTarget) return;
      const btn = document.getElementById('resetPinConfirmBtn');
      btn.disabled=true; btn.textContent='กำลัง Reset...';
      try {
        await api('changePin', { name:_resetPinTarget.name, newPin:_resetPinNew, role:_resetPinTarget.role });
        toast('Reset PIN สำเร็จ','success');
        closeResetPinModal();
      } catch(e){ toast('Reset ไม่สำเร็จ','error'); }
      btn.disabled=false; btn.textContent='ยืนยัน Reset';
    }

    // ===== INIT =====
    async function init(forceRefresh = false) {
      goScreen('loading');
      document.getElementById('loadingMsg').textContent = 'กำลังดึงข้อมูลผู้ใช้...';
      document.getElementById('loadingSlowHint').classList.add('hidden');
      document.getElementById('loadingRetryBtn').classList.add('hidden');
      try {
        const cached = forceRefresh ? null : cacheGet('users');
        if (cached) {
          AU = cached; buildLoginScreen(); goScreen('login'); lucide.createIcons();
          api('getUsers').then(d=>{ AU=d; cacheSet('users',d); }).catch(()=>{});
          return;
        }
        AU = await api('getUsers');
        if (AUTH_MODE !== 'legacy') toast(`โหมดเริ่มต้น: ใช้ PIN ${FALLBACK_PIN} สำหรับการเข้าใช้งาน`, 'warning');
        cacheSet('users', AU);
        buildLoginScreen(); goScreen('login'); lucide.createIcons();
      } catch(e) {
        console.error('[init]', e);
        document.getElementById('loadingMsg').textContent = 'ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่';
        document.getElementById('loadingSlowHint').classList.remove('hidden');
        document.getElementById('loadingRetryBtn').classList.remove('hidden');
      }
    }

    // ===== REFRESH DATA =====
    async function refreshData() {
      try {
        EQ = await api('getEquipment');
        BORROWS = await api('getBorrows', { name:CU.name, role:CU.role });
      } catch(e) { console.warn('[refresh]', e); }
    }

    // Start app
    document.addEventListener('DOMContentLoaded', () => init());
  </script>
</body>
</html>
